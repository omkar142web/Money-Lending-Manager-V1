      }

      html {
        overflow-x: hidden;

      }

      }

      .blob {
        position: absolute;
        border-radius: 50%;
        filter: blur(90px);
        z-index: 0;
        pointer-events: none;
      }
      .blob-1 {
        width: 380px;
        height: 380px;
        top: -12%;
        left: -8%;
        background: var(--primary);
        /* opacity: 0.12; */
        opacity: 0.08;
        filter: blur(110px);
        animation: drift-1 8s ease-in-out infinite alternate;
      }
      .blob-2 {
        width: 340px;
        height: 340px;
        bottom: -12%;
        right: -8%;
        background: #818cf8;
        opacity: 0.12;
        animation: drift-2 9s ease-in-out infinite alternate;
      }

      @keyframes drift-1 {
        from {
          transform: translate(0, 0) scale(1);
        }
        to {
          transform: translate(30px, 20px) scale(1.1);
        }
      }
      @keyframes drift-2 {
        from {
          transform: translate(0, 0) scale(1);
        }
        to {
          transform: translate(-25px, -15px) scale(1.08);
        }
      }

      .scanline {
        position: fixed;
        inset: 0;
        background: linear-gradient(
          to bottom,
          transparent 50%,
          rgba(0, 0, 0, 0.09) 50%
        );
        background-size: 100% 4px;
        z-index: 20;
        pointer-events: none;
      }

      .particles {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 1;
        overflow: hidden;
      }
      .particle {
        position: absolute;
        border-radius: 50%;
        animation: float-up linear infinite;
        opacity: 0;
      }

      @keyframes float-up {
        0% {
          transform: translateY(100vh) scale(0);
          opacity: 0;
        }
        10% {
          opacity: 1;
        }
        90% {
          opacity: 0.4;
        }
        100% {
          transform: translateY(-10vh) scale(1);
          opacity: 0;
        }
      }

      .card {
        height: fit-content;

        background: var(--terminal-bg);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        padding: 2.4rem 2.4rem 3rem;
        border-radius: 12px;
        width: 92%;
        max-width: 448px;
        border: 1px solid rgba(56, 189, 248, 0.25);
        box-shadow:
          0 25px 60px -12px rgba(0, 0, 0, 0.6),
          0 0 40px rgba(56, 189, 248, 0.05),
          inset 0 1px 0 rgba(255, 255, 255, 0.05);

        position: relative;
        z-index: 10;
        animation: slideUp 0.55s cubic-bezier(0.22, 1, 0.36, 1) both;
        /* clip-path: polygon(
          0 0,
          calc(100% - 28px) 0,
          100% 28px,
          100% 100%,
          0 100%
        ); */
      }

      .card-badge {
        position: absolute;
        top: -1px;
        right: -1px;
        background: var(--bg);
        padding: 5px 14px;
        color: var(--primary);
        font-family: "JetBrains Mono", monospace;
        font-size: 0.72rem;
        letter-spacing: 3px;
        font-weight: 700;
        border: 1px solid rgba(56, 189, 248, 0.3);
        border-top-right-radius: 12px;
      }

      .card::after {
        content: "";
        position: absolute;
        bottom: -1px;
        left: -1px;
        width: 32px;
        height: 32px;
        border-bottom: 2px solid rgba(56, 189, 248, 0.4);
        border-left: 2px solid rgba(56, 189, 248, 0.4);
        border-bottom-left-radius: 12px;
      }

      .card::before {
        content: "";
        position: absolute;
        bottom: -1px;
        right: -1px;

        width: 32px;
        height: 32px;

        border-bottom: 2px solid rgba(56, 189, 248, 0.4);
        border-right: 2px solid rgba(56, 189, 248, 0.4);

        border-bottom-right-radius: 12px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 1.5rem;
      }

      .brand-icon {
        width: 38px;
        height: 38px;
        border-radius: 10px;
        background: rgba(56, 189, 248, 0.1);
        border: 1px solid rgba(56, 189, 248, 0.28);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .brand-icon svg {
        width: 18px;
        height: 18px;
        stroke: var(--primary);
      }

      .brand-name {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.78rem;
        font-weight: 700;
        color: var(--primary);
        letter-spacing: 1.5px;
        text-transform: uppercase;
        line-height: 1.2;
      }

      .brand-tagline {
        font-size: 0.63rem;
        color: #475569;
        font-family: "JetBrains Mono", monospace;
      }

      .heading-block {
        margin-bottom: 1.2rem;
        border-bottom: 1px solid rgba(56, 189, 248, 0.1);
        padding-bottom: 1.2rem;
      }

      .welcome-label {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.7rem;
        text-transform: uppercase;
        color: var(--primary);
        letter-spacing: 3px;
        margin-bottom: 0.4rem;
      }

      h1 {
        font-size: 1.5rem;
        font-weight: 800;
        color: var(--text);
        line-height: 1.2;
        margin-bottom: 0.4rem;
        letter-spacing: -0.5px;
      }

      .subtext {
        color: #64748b;
        font-size: 0.82rem;
        line-height: 1.6;
      }

      .status-tag {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.63rem;
        color: #22c55e;
        background: rgba(34, 197, 94, 0.07);
        border: 1px solid rgba(34, 197, 94, 0.22);
        padding: 4px 11px;
        border-radius: 6px;
        display: inline-block;
        margin-bottom: 1.1rem;
        letter-spacing: 1px;
        animation: gpulse 2.5s ease-in-out infinite alternate;
        text-shadow: 0 0 8px rgba(34, 197, 94, 0.35);
      }

      .status-tag-footer {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.63rem;
        color: #22c55e;
        background: rgba(34, 197, 94, 0.07);
        border: 1px solid rgba(34, 197, 94, 0.22);
        padding: 4px 11px;
        border-radius: 6px;
        display: inline-block;
        /* margin-top: 1.1rem; */
        letter-spacing: 1px;
        animation: gpulse 2.5s ease-in-out infinite alternate;
        text-shadow: 0 0 8px rgba(34, 197, 94, 0.35);

        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        width: max-content;
      }

      @keyframes gpulse {
        from {
          box-shadow: 0 0 6px rgba(34, 197, 94, 0.04);
        }
        to {
          box-shadow: 0 0 18px rgba(34, 197, 94, 0.16);
        }
      }

      .form-group {
        margin-bottom: 0.9rem;
      }

      label {
        display: block;
        font-family: "JetBrains Mono", monospace;
        font-size: 0.68rem;
        color: #94a3b8;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        margin-bottom: 5px;
      }

      .input-wrap {
        position: relative;
      }

      .input-icon {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        width: 15px;
        height: 15px;
        stroke: #475569;
        pointer-events: none;
        transition: stroke 0.2s;
      }

      .input-wrap:focus-within .input-icon {
        stroke: var(--primary);
      }

      input[type="email"],
      input[type="password"],
      input[type="text"] {
        width: 100%;
        padding: 11px 38px 11px 36px;
        background: var(--input-bg);
        border: 1px solid var(--input-border);
        border-radius: 10px;
        color: var(--text);
        font-family: "Plus Jakarta Sans", sans-serif;
        font-size: 0.88rem;
        outline: none;
        transition:
          border-color 0.2s,
          box-shadow 0.2s,
          background 0.2s;
      }

      /* input[type="text"], */
      input[type="email"]{
        padding: 11px 5px 11px 36px;
      }

      input::placeholder {
        color: #334155;
      }

      input:focus {
        border-color: var(--input-border-focus);
        background: rgba(56, 189, 248, 0.04);
        box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.08);
      }

      .pw-toggle {
        position: absolute;
        right: 11px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        cursor: pointer;
        padding: 0;
        display: flex;
        align-items: center;
      }

      .pw-toggle svg {
        width: 15px;
        height: 15px;
        stroke: #475569;
        transition: stroke 0.2s;
        fill: none;
      }
      .pw-toggle:hover svg {
        stroke: var(--primary);
      }

      .forgot {
        display: block;
        text-align: right;
        font-size: 0.72rem;
        color: #475569;
        text-decoration: none;
        margin-top: 5px;
        font-family: "JetBrains Mono", monospace;
        letter-spacing: 0.5px;
        transition: color 0.2s;
      }
      .forgot:hover {
        color: var(--primary);
      }

      .btn-login {
        width: 100%;
        padding: 13px;
        background: var(--primary);
        color: #0f172a;
        font-family: "Plus Jakarta Sans", sans-serif;
        font-weight: 700;
        font-size: 0.9rem;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        margin-top: 1.1rem;
        margin-bottom: 0.9rem;
        letter-spacing: 0.3px;
        transition:
          background 0.2s,
          transform 0.2s,
          box-shadow 0.2s;
        position: relative;
        overflow: hidden;
      }

      .btn-login::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0.14),
          transparent
        );
        pointer-events: none;
      }

      .btn-login:hover {
        background: #7dd3fc;
        transform: translateY(-1px);
        box-shadow: 0 0 22px rgba(56, 189, 248, 0.4);
      }
      .btn-login:active {
        transform: translateY(0);
      }

      .or-divider {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 0.9rem;
      }

      .or-divider span {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.62rem;
        color: #334155;
        letter-spacing: 2px;
        flex-shrink: 0;
      }

      .or-line {
        flex: 1;
        height: 1px;
        background: linear-gradient(
          to right,
          transparent,
          rgba(56, 189, 248, 0.15),
          transparent
        );
      }

      .btn-google {
        width: 100%;
        padding: 11px 16px;
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        font-family: "Plus Jakarta Sans", sans-serif;
        font-weight: 600;
        font-size: 0.86rem;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        transition:
          background 0.2s,
          border-color 0.2s,
          transform 0.2s;
        text-decoration: none;
      }

      .btn-google:hover {
        background: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.2);
        transform: translateY(-1px);
      }
      .btn-google:active {
        transform: translateY(0);
      }

      .google-icon {
        width: 18px;
        height: 18px;
        flex-shrink: 0;
      }

      .card-footer {
        margin-top: 1.2rem;
        padding-top: 1.1rem;
        border-top: 1px solid rgba(56, 189, 248, 0.08);
        text-align: center;
        font-size: 0.78rem;
        color: #475569;
        font-family: "JetBrains Mono", monospace;
        letter-spacing: 0.3px;

        /* from status-tag-footer */
        margin-bottom: 1.2rem;
      }

      @media (max-width: 400px) {
        .card-footer {
          display: flex;
          justify-content: center;
          margin-bottom: 1.2rem;
          flex-direction: column;
          gap: 7px;
        }
      }

      .card-footer a {
        /* color: var(--primary); */
        color: var(--error-pink);
        text-decoration: none;
        font-weight: 700;
      }
      .card-footer a:hover {
        text-decoration: underline;
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(32px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .gradient-text {
        background: linear-gradient(to right, #ffffff, #7dd3fc, #818cf8);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .disabled {
        /* pointer-events: none; */
        opacity: 0.5;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <div class="mesh"></div>
    <div class="grid-floor"></div>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <!-- <div class="scanline"></div> -->
    <div class="particles" id="particles"></div>

    <div class="card">
      <div class="card-badge">[ AUTH_PORTAL ]</div>

      <div class="brand">
        <div class="brand-icon">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke-width="1.8"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"
            />
            <polyline points="13 2 13 9 20 9" />
            <line x1="9" y1="13" x2="15" y2="13" />
            <line x1="9" y1="17" x2="13" y2="17" />
          </svg>
        </div>
        <div>
          <div class="brand-name">Share Info Platform</div>
          <div class="brand-tagline">
            Share ideas. Store links. Connect instantly.
          </div>
        </div>
      </div>

      <div class="heading-block">
        <div class="welcome-label">// Welcome_Back</div>
        <h1 class="gradient-text">Login to continue</h1>
        <p class="subtext">
          Sharing links, texts, notes, and resources with your community.
        </p>
      </div>

      <!-- <div class="status-tag">STATUS: SECURE_CONN // TLS_1.3</div> -->

      <form action="/login" method="POST">
        <div class="form-group">
          <label for="email">Email Address</label>
          <div class="input-wrap">
            <svg
              class="input-icon"
              viewBox="0 0 24 24"
              fill="none"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect x="2" y="4" width="20" height="16" rx="2" />
              <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
            </svg>
            <input
              required
              type="email"
              id="email"
              name="email"
              placeholder="you@example.com"
              autocomplete="email"
            />
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrap">
            <svg
              class="input-icon"
              viewBox="0 0 24 24"
              fill="none"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
              <path d="M7 11V7a5 5 0 0 1 10 0v4" />
            </svg>
            <input
              required
              type="password"
              id="password"
              name="password"
              placeholder="••••••••••"
              autocomplete="current-password"
            />
            <button
              class="pw-toggle"
              type="button"
              onclick="togglePw()"
              aria-label="Toggle password"
            >
              <svg
                id="eye-icon"
                viewBox="0 0 24 24"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
          <a href="#" class="disabled forgot">Forgot password?</a>
        </div>

        <button class="btn-login" type="submit">Login to Platform</button>

        <div class="or-divider">
          <div class="or-line"></div>
          <span>OR CONTINUE WITH</span>
          <div class="or-line"></div>
        </div>

        <a href="#" class="disabled btn-google">
          <svg
            class="google-icon"
            viewBox="0 0 24 24"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path

    <script>
      document.querySelectorAll(".disabled").forEach((el) => {
        el.addEventListener("click", (e) => {
          e.preventDefault();
        });
      });

      const container = document.getElementById("particles");
      const colors = [
        "rgba(56,189,248,",
        "rgba(129,140,248,",
        "rgba(255,117,160,",
      ];
      for (let i = 0; i < 22; i++) {
        const p = document.createElement("div");
        p.className = "particle";
        const size = Math.random() * 4 + 2;
        const col = colors[Math.floor(Math.random() * colors.length)];
        p.style.cssText = `left:${Math.random() * 100}%;width:${size}px;height:${size}px;background:${col}0.7);box-shadow:0 0 ${size * 2}px ${col}0.4);animation-duration:${Math.random() * 8 + 6}s;animation-delay:-${Math.random() * 8}s;`;
        container.appendChild(p);
      }

      function togglePw() {
        const pw = document.getElementById("password");
        const icon = document.getElementById("eye-icon");
        const show = pw.type === "password";
        pw.type = show ? "text" : "password";
        icon.innerHTML = show
          ? `<line x1="1" y1="1" x2="23" y2="23" stroke-linecap="round"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 11 7 11 7a13.16 13.16 0 0 1-1.67 2.68M6.61 6.61A13.526 13.526 0 0 0 1 12s4 7 11 7a9.74 9.74 0 0 0 5.39-1.61"/>`
          : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
      }
